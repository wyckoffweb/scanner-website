<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div id="last-updated">Last updated: ...</div>
</header>

<div class="tile-container">

    <div class="tile" onclick="loadSection('confluence', this)">🔥 Confluence <span id="count-confluence"></span></div>
    <div class="tile" onclick="loadSection('breakout', this)">📈 Breakout <span id="count-breakout"></span></div>
    <div class="tile" onclick="loadSection('ema50_pullback', this)">📉 EMA Pullback <span id="count-ema50_pullback"></span></div>
    <div class="tile" onclick="loadSection('ema20_trend', this)">📊 EMA20 Trend <span id="count-ema20_trend"></span></div>
    <div class="tile" onclick="loadSection('rsi_momentum', this)">⚡ RSI <span id="count-rsi_momentum"></span></div>
    <div class="tile" onclick="loadSection('bollinger', this)">📦 Bollinger <span id="count-bollinger"></span></div>
    <div class="tile" onclick="loadSection('golden_cross', this)">🏆 Golden Cross <span id="count-golden_cross"></span></div>
    <div class="tile" onclick="loadSection('ranking', this)">🏆 Wyckoff <span id="count-ranking"></span></div>

</div>

<section id="main-section">
    <h2 id="section-title">🔥 Confluence</h2>
    <div id="main-grid" class="grid"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>
    <div class="nav-arrow left" onclick="prevImage()">❮</div>

    <img id="modal-img">

    <div id="chart-counter">1 / 1</div>

    <div class="nav-arrow right" onclick="nextImage()">❯</div>
</div>

<button id="topBtn" onclick="scrollToTop()">↑</button>

<script src="script.js"></script>

</body>
</html>
