<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div id="last-updated">Last updated: ...</div>

    <div class="tabs">
        <button onclick="goToConfluence()">Swing</button>
        <button onclick="goToWyckoff()">Wyckoff</button>
    </div>
</header>

<!-- TILE MENU -->
<div id="tile-menu" class="tile-container">

    <div class="tile" onclick="goToConfluence()">🔥 Confluence</div>
    <div class="tile" onclick="goToStrategy('breakout')">📈 Breakout</div>
    <div class="tile" onclick="goToStrategy('ema50_pullback')">📉 EMA Pullback</div>
    <div class="tile" onclick="goToStrategy('ema20_trend')">📊 EMA20 Trend</div>
    <div class="tile" onclick="goToStrategy('rsi_momentum')">⚡ RSI</div>
    <div class="tile" onclick="goToStrategy('bollinger')">📦 Bollinger</div>
    <div class="tile" onclick="goToStrategy('golden_cross')">🏆 Golden Cross</div>
    <div class="tile" onclick="goToWyckoff()">🏆 Wyckoff</div>

</div>

<!-- STRATEGY PANEL -->
<div id="strategy-panel" class="strategy-panel">
    Select a strategy to see logic
</div>

<!-- SWING -->
<section>
    <h2>🔥 Confluence</h2>
    <div id="swing-confluence" class="grid"></div>

    <h2>📈 Strategies</h2>
    <div id="strategy-results" class="grid"></div>
</section>

<!-- WYCKOFF -->
<section>
    <h2>🏆 Ranking</h2>
    <div id="ranking" class="grid"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>

    <div class="nav-arrow left" onclick="prevImage()">❮</div>

    <img id="modal-img">

    <div id="chart-counter">1 / 1</div>

    <div class="nav-arrow right" onclick="nextImage()">❯</div>
</div>

<!-- BACK TO TOP -->
<button id="topBtn" onclick="scrollToTop()">↑</button>

<script src="script.js"></script>

</body>
</html>
