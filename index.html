<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div class="tabs">
        <button onclick="showTab('swing')">Swing</button>
        <button onclick="showTab('wyckoff')">Wyckoff</button>
    </div>
</header>

<!-- TILE MENU -->
<div id="tile-menu" class="tile-container">

    <div class="tile" onclick="goToConfluence()">🔥 Confluence</div>
    <div class="tile" onclick="goToStrategy('breakout')">📈 Breakout</div>
    <div class="tile" onclick="goToStrategy('ema50_pullback')">📉 EMA Pullback</div>
    <div class="tile" onclick="goToWyckoff('ranking')">🏆 Wyckoff Ranking</div>

</div>

<!-- SWING -->
<section id="swing" class="tab">

    <div id="confluence-section">
        <h2>🔥 Confluence</h2>
        <div id="swing-confluence" class="grid"></div>
    </div>

    <div id="strategy-section">
        <h2>📈 Strategies</h2>
        <div id="strategy-results" class="grid"></div>
    </div>

</section>

<!-- WYCKOFF -->
<section id="wyckoff" class="tab hidden">

    <div id="ranking-section">
        <h2>🏆 Ranking</h2>
        <div id="ranking" class="grid"></div>
    </div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>
    <img id="modal-img">
</div>

<script src="script.js"></script>

</body>
</html>
