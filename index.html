<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div class="tabs">
        <button onclick="showTab('swing')">Swing</button>
        <button onclick="showTab('wyckoff')">Wyckoff</button>
    </div>
</header>

<!-- SWING -->
<section id="swing" class="tab">

    <h2>🔥 Confluence</h2>
    <div id="swing-confluence" class="grid"></div>

    <h2>📈 Strategies</h2>
    <div class="strategy-tabs">
        <button onclick="loadStrategy('breakout')">Breakout</button>
        <button onclick="loadStrategy('ema50_pullback')">EMA50</button>
        <button onclick="loadStrategy('ema20_trend')">Trend</button>
        <button onclick="loadStrategy('rsi')">RSI</button>
        <button onclick="loadStrategy('bollinger')">Bollinger</button>
        <button onclick="loadStrategy('new_ipos')">IPO</button>
    </div>

    <div id="strategy-results" class="grid"></div>

</section>

<!-- WYCKOFF -->
<section id="wyckoff" class="tab hidden">

    <h2>📊 Daily</h2>
    <div id="daily" class="grid"></div>

    <h2>📊 Weekly</h2>
    <div id="weekly" class="grid"></div>

    <h2>📊 Monthly</h2>
    <div id="monthly" class="grid"></div>

    <h2>🏆 Ranking</h2>
    <div id="ranking" class="grid"></div>

</section>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
    <img id="modal-img">
</div>

<script src="script.js"></script>

</body>
</html>
