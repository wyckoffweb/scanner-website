<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>

    <div id="last-updated" class="last-updated">
        Last updated: Loading...
    </div>

    <div class="tabs">
        <button onclick="showTab('swing')">Swing</button>
        <button onclick="showTab('wyckoff')">Wyckoff</button>
    </div>
</header>

<div id="tile-menu" class="tile-container"></div>

<section id="swing" class="tab"></section>
<section id="wyckoff" class="tab hidden"></section>

<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>
    <div class="nav-arrow left" onclick="prevImage()">❮</div>
    <img id="modal-img">
    <div class="nav-arrow right" onclick="nextImage()">❯</div>
</div>

<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<script src="script.js"></script>

</body>
</html>
