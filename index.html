<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div id="last-updated">Last updated: ...</div>
</header>

<!-- TILE MENU -->
<div class="tile-container">

    <div class="tile" onclick="goToSection('confluence')">🔥 Confluence</div>
    <div class="tile" onclick="goToSection('breakout')">📈 Breakout</div>
    <div class="tile" onclick="goToSection('ema50_pullback')">📉 EMA Pullback</div>
    <div class="tile" onclick="goToSection('ema20_trend')">📊 EMA20 Trend</div>
    <div class="tile" onclick="goToSection('rsi_momentum')">⚡ RSI</div>
    <div class="tile" onclick="goToSection('bollinger')">📦 Bollinger</div>
    <div class="tile" onclick="goToSection('golden_cross')">🏆 Golden Cross</div>
    <div class="tile" onclick="goToSection('ranking')">🏆 Wyckoff</div>

</div>

<!-- SECTIONS -->

<section id="confluence">
    <h2>🔥 Confluence</h2>
    <div class="grid" id="confluence-grid"></div>
</section>

<section id="breakout">
    <h2>📈 Breakout</h2>
    <div class="grid" id="breakout-grid"></div>
</section>

<section id="ema50_pullback">
    <h2>📉 EMA Pullback</h2>
    <div class="grid" id="ema50_pullback-grid"></div>
</section>

<section id="ema20_trend">
    <h2>📊 EMA20 Trend</h2>
    <div class="grid" id="ema20_trend-grid"></div>
</section>

<section id="rsi_momentum">
    <h2>⚡ RSI Momentum</h2>
    <div class="grid" id="rsi_momentum-grid"></div>
</section>

<section id="bollinger">
    <h2>📦 Bollinger</h2>
    <div class="grid" id="bollinger-grid"></div>
</section>

<section id="golden_cross">
    <h2>🏆 Golden Cross</h2>
    <div class="grid" id="golden_cross-grid"></div>
</section>

<section id="ranking">
    <h2>🏆 Wyckoff Ranking</h2>
    <div class="grid" id="ranking-grid"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>
    <div class="nav-arrow left" onclick="prevImage()">❮</div>

    <img id="modal-img">
    <div id="chart-counter">1 / 1</div>

    <div class="nav-arrow right" onclick="nextImage()">❯</div>
</div>

<button id="topBtn" onclick="scrollToTop()">↑</button>

<script src="script.js"></script>

</body>
</html>
