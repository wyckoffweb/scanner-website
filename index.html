<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div id="last-updated">Last updated: ...</div>
</header>

<!-- TILE MENU -->
<div class="tile-container">

    <div class="tile" onclick="loadSection('confluence')">🔥 Confluence</div>
    <div class="tile" onclick="loadSection('breakout')">📈 Breakout</div>
    <div class="tile" onclick="loadSection('ema50_pullback')">📉 EMA Pullback</div>
    <div class="tile" onclick="loadSection('ema20_trend')">📊 EMA20 Trend</div>
    <div class="tile" onclick="loadSection('rsi_momentum')">⚡ RSI</div>
    <div class="tile" onclick="loadSection('bollinger')">📦 Bollinger</div>
    <div class="tile" onclick="loadSection('golden_cross')">🏆 Golden Cross</div>
    <div class="tile" onclick="loadSection('ranking')">🏆 Wyckoff</div>

</div>

<!-- DYNAMIC SECTION -->
<section id="main-section">

    <h2 id="section-title">🔥 Confluence</h2>

    <div id="main-grid" class="grid"></div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>
    <div class="nav-arrow left" onclick="prevImage()">❮</div>

    <img id="modal-img">
    <div id="chart-counter">1 / 1</div>

    <div class="nav-arrow right" onclick="nextImage()">❯</div>
</div>

<button id="topBtn" onclick="scrollToTop()">↑</button>

<script src="script.js"></script>

</body>
</html>
