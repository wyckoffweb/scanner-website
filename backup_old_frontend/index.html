<!DOCTYPE html>
<html>
<head>
    <title>Wyckoff Scanner</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 Wyckoff Scanner</h1>
    <div id="last-updated">Last updated: ...</div>
</header>

<div class="tile-container">

    <div class="tile" onclick="loadSection('confluence', this)">
        🔥 Multi-Signal Confluence <span id="count-confluence">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('breakout', this)">
        📈 Clean Breakout <span id="count-breakout">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('ema50_pullback', this)">
        📉 Precision Pullback <span id="count-ema50_pullback">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('ema20_trend', this)">
        📊 Momentum Continuation <span id="count-ema20_trend">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('rsi_momentum', this)">
        ⚡ Momentum Ignition <span id="count-rsi_momentum">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('bollinger', this)">
        📦 Volatility Expansion <span id="count-bollinger">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('golden_cross', this)">
        🏆 Structural Trend Shift <span id="count-golden_cross">(0)</span>
    </div>

    <div class="tile" onclick="loadSection('ranking', this)">
        🏆 Wyckoff Ranking <span id="count-ranking">(0)</span>
    </div>

</div>

<section>
    <h2 id="section-title">Charts</h2>
    <div id="main-grid" class="grid"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close-btn" onclick="closeModal()">✕</span>
    <div class="nav-arrow left" onclick="prevImage()">❮</div>

    <img id="modal-img">

    <div id="chart-counter"></div>

    <div class="nav-arrow right" onclick="nextImage()">❯</div>
</div>

<button id="topBtn" onclick="scrollToTop()">↑</button>

<script src="script.js"></script>

</body>
</html>
